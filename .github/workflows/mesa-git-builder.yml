name: Build Mesa-git (GPT363)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия сборки (например, 1.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      BUILD_VERSION: ${{ inputs.version }}
    steps:
    - uses: actions/checkout@v4

    - name: Run Build Script
      run: bash ./turnip_builder_upstream.sh

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ inputs.version }}
        name: Mesa Turnip Gen8 v${{ inputs.version }}
        body: |
          Сборка на основе последнего коммита Mesa GitLab.
          Целевое устройство: Adreno 810 (Gen8).
          Использованы хаки для активации GPU.
        files: /tmp/mesa-turnip-gen8-V${{ inputs.version }}.zip
        
