name: Build Mesa-git (A810 Only)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string

jobs:
  start_building_turnip:
    runs-on: ubuntu-24.04
    env:
      BUILD_VERSION: ${{ inputs.version }}

    steps:
    - uses: actions/checkout@v3

    - name: Prepare environment
      run: |
        sudo sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources
        sudo apt update
        sudo apt install build-essential flex bison glslang-tools
        sudo apt install meson-1.5

    - name: Execute build script
      run: bash ./turnip_builder_upstream.sh

    - name: Release "turnip"
      uses: softprops/action-gh-release@v1
      with:
        tag_name: a810_v${{ inputs.version }}
        name: Mesa Turnip A810 Only v${{ inputs.version }}
        body: |
          Mesa Turnip (A810 Only)
          Version: ${{ inputs.version }}

          Built from upstream Mesa (main branch)
          Includes whitebelyash patchset (KGSL enablement)
          Compiled with DVD_Disk A810-only optimizations.

          ⚠️ WARNING
          • Works ONLY on Adreno 810
          • Sysmem-only rendering
          • Optimized for Winlator/DXVK/VKD3D workloads

        files: |
          /tmp/a810_only-main-V${{ inputs.version }}.zip
