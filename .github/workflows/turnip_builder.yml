name: Build "turnip"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
        type: string

jobs:
  start_building_turnip:
    runs-on: ubuntu-24.04
    env:
      BUILD_VERSION: ${{ inputs.version }}

    steps:
    - uses: actions/checkout@v3

    - name: Prepare environment
      run: |
        sudo sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources
        sudo apt update
        sudo apt install build-essential flex bison glslang-tools
        sudo apt install meson-1.5

    - name: Execute build script
      run: bash ./turnip_builder.sh

    - name: Release "turnip"
      uses: softprops/action-gh-release@v1
      with:
        tag_name: tu_v${{ inputs.version }}
        name: Turnip A810_only v${{ inputs.version }}
        body: |
          Turnip TU8 — Autotuner branch build for Adreno 810.

          This release is based on the Autotuner branch with experimental optimizations.
          Stability may vary depending on device.

          🖥 Supported GPU
          • Adreno 810 — sysmem-only, tuned.

          ⚠️ Notes
          • If you see black artifacts, disable DXVK_HUD=0
          • TU_DEBUG=nolrz may help in unstable games

        files: |
          /tmp/a810_only-Autotuner-V${{ inputs.version }}.zip
