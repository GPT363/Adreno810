name:  Create Patches from Your Changes

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release with patches'
        required: true
        default: true
        type: boolean

jobs:
  create-patches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        path: your-repo

    - name: Clone whitebelyashx/mesa-tu8 (using git clone with auth)
      run: |
        # Используем клон без авторизации (публичный репозиторий)
        git clone https://github.com/whitebelyashx/mesa-tu8.git whitebelyash-repo || \
        git clone git://github.com/whitebelyashx/mesa-tu8.git whitebelyash-repo || \
        {
          echo " Failed to clone whitebelyashx/mesa-tu8"
          exit 1
        }
        
        cd whitebelyash-repo
        echo "Whitebelyash latest commit: $(git rev-parse HEAD)" > ../whitebelyash-info.txt
        git rev-parse HEAD > ../whitebelyash-commit.txt

    - name: Find common ancestor
      run: |
        cd your-repo
        
        # Добавляем whitebelyash как remote
        git remote add whitebelyash https://github.com/whitebelyashx/mesa-tu8.git
        git fetch whitebelyash --depth=100 || git fetch whitebelyash
        
        # Находим точку расхождения
        BASE=$(git merge-base HEAD whitebelyash/main || echo "")
        
        if [ -n "$BASE" ]; then
          echo "BASE_COMMIT=$BASE" >> $GITHUB_ENV
          echo " Found common ancestor: $BASE"
        else
          # Если не нашли - пробуем найти через историю
          echo "Could not find common ancestor, checking first commits..."
          
          # Берём первый коммит whitebelyash
          cd ../whitebelyash-repo
          WB_FIRST=$(git rev-list --max-parents=0 HEAD)
          cd ../your-repo
          
          echo "BASE_COMMIT=$WB_FIRST" >> $GITHUB_ENV
          echo " Using whitebelyash first commit: $WB_FIRST"
        fi
        
        echo "Your latest commit: $(git rev-parse HEAD)"

    - name: Create mega patch (ALL changes in one file)
      run: |
        cd your-repo
        mkdir -p ../patches
        
        # Создаём ОДИН большой патч со ВСЕМИ изменениями
        echo " Creating mega patch with ALL changes..."
        git diff $BASE_COMMIT..HEAD > ../patches/a810-complete.patch
        
        # Создаём также список изменённых файлов
        git diff --name-only $BASE_COMMIT..HEAD > ../patches/changed-files.txt
        
        # Статистика
        echo " Changes statistics:" >> ../patches/README.md
        git diff --stat $BASE_COMMIT..HEAD >> ../patches/README.md

    - name: Upload patch as artifact
      uses: actions/upload-artifact@v4
      with:
        name: a810-mega-patch
        path: patches/
        retention-days: 90

    - name: Create GitHub Release with patch
      if: github.event.inputs.create_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: a810-patch-${{ github.run_number }}
        name: " A810 Mega Patch #${{ github.run_number }}"
        body: |
          ##  ОДИН БОЛЬШОЙ ПАТЧ СО ВСЕМИ ИЗМЕНЕНИЯМИ

          ### 🔧 Как использовать:
          ```bash
          # Скачай свежий Mesa
          git clone https://gitlab.freedesktop.org/mesa/mesa.git
          cd mesa
          
          # Примени патч
          git apply /path/to/a810-complete.patch
          
          # Собери
          meson setup build
          ninja -C build
          ```

          ### Статистика:
          $(cat patches/README.md)

          ### Изменённые файлы:
          $(cat patches/changed-files.txt | sed 's/^/- `/; s/$/`/')
        files: |
          patches/a810-complete.patch
          patches/changed-files.txt
