name: Create Patches from my Changes

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release with patches'
        required: true
        default: true
        type: boolean

jobs:
  create-patches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout your repository (mesa-git branch)
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        path: your-repo
        ref: mesa-git

    - name: Clone whitebelyash/mesa-tu8 (gen8 branch)
      run: |
        git clone --branch gen8 https://github.com/whitebelyash/mesa-tu8.git whitebelyash-repo
        cd whitebelyash-repo
        WB_COMMIT=$(git rev-parse HEAD)
        echo "WB_COMMIT=$WB_COMMIT" >> $GITHUB_ENV
        echo "Whitebelyash latest commit: $WB_COMMIT"

    - name: Find common ancestor with gen8
      id: find-base
      run: |
        cd your-repo
        
        # Добавляем whitebelyash и фетчим gen8
        git remote add whitebelyash https://github.com/whitebelyash/mesa-tu8.git
        git fetch whitebelyash gen8 --depth=100
        
        # Пытаемся найти общий коммит с gen8
        BASE=$(git merge-base HEAD whitebelyash/gen8 || echo "")
        
        if [ -n "$BASE" ]; then
          echo "BASE_COMMIT=$BASE" >> $GITHUB_ENV
          echo "Found common ancestor with gen8: $BASE"
        else
          echo "No common ancestor found, using whitebelyash first commit"
          echo "BASE_COMMIT=${{ env.WB_COMMIT }}" >> $GITHUB_ENV
        fi

    - name: Get your latest commit
      run: |
        cd your-repo
        YOUR_COMMIT=$(git rev-parse HEAD)
        echo "YOUR_COMMIT=$YOUR_COMMIT" >> $GITHUB_ENV

    - name: Create mega patch
      run: |
        cd your-repo
        mkdir -p ../patches
        
        echo "Creating mega patch from ${{ env.BASE_COMMIT }} to HEAD..."
        git diff ${{ env.BASE_COMMIT }}..HEAD > ../patches/a810-complete.patch
        
        git diff --name-only ${{ env.BASE_COMMIT }}..HEAD > ../patches/changed-files.txt
        
        {
          echo "# A810 Patches vs whitebelyash/mesa-tu8 (gen8)"
          echo ""
          echo "## Information"
          echo "- Your branch: mesa-git"
          echo "- Your latest commit: ${{ env.YOUR_COMMIT }}"
          echo "- Whitebelyash branch: gen8"
          echo "- Whitebelyash commit: ${{ env.WB_COMMIT }}"
          echo "- Base commit: ${{ env.BASE_COMMIT }}"
          echo ""
          echo "## Changed files"
          echo '```'
          cat ../patches/changed-files.txt
          echo '```'
          echo ""
          echo "## Changes statistics"
          echo '```'
          git diff --stat ${{ env.BASE_COMMIT }}..HEAD
          echo '```'
        } > ../patches/README.md

    - name: Upload patch as artifact
      uses: actions/upload-artifact@v4
      with:
        name: a810-mega-patch
        path: patches/
        retention-days: 90

    - name: Create GitHub Release with patch
      if: github.event.inputs.create_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: a810-patch-${{ github.run_number }}
        name: "A810 Mega Patch #${{ github.run_number }}"
        body: |
          ONE BIG PATCH WITH ALL CHANGES

          Information:
          - Your branch: mesa-git
          - Your commit: ${{ env.YOUR_COMMIT }}
          - Whitebelyash branch: gen8
          - Whitebelyash commit: ${{ env.WB_COMMIT }}
          - Base commit: ${{ env.BASE_COMMIT }}

          How to use:
          ```
          git clone https://gitlab.freedesktop.org/mesa/mesa.git
          cd mesa
          git apply /path/to/a810-complete.patch
          meson setup build
          ninja -C build
          ```

          Total files changed: $(cat patches/changed-files.txt | wc -l)

          Changed files:
          $(cat patches/changed-files.txt | sed 's/^/- /')
        files: |
          patches/a810-complete.patch
          patches/changed-files.txt
          patches/README.md
