name:  Create A810 Patch

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release with patch'
        required: true
        default: true
        type: boolean

jobs:
  create-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout your repo (GPT363/mesa-tu8, gen8)
        uses: actions/checkout@v4
        with:
          repository: GPT363/mesa-tu8
          ref: gen8
          path: your-repo
          fetch-depth: 0

      - name: Checkout whitebelyash repo (whitebelyash/mesa-tu8, gen8)
        uses: actions/checkout@v4
        with:
          repository: whitebelyash/mesa-tu8
          ref: gen8
          path: whitebelyash-repo
          fetch-depth: 0

      - name: Create patches
        run: |
          cd your-repo
          
          # Добавляем Беляша
          git remote add whitebelyash ../whitebelyash-repo
          git fetch whitebelyash
          
          # Находим точку расхождения
          BASE=$(git merge-base HEAD whitebelyash/gen8)
          echo "Base commit: $BASE"
          
          # СОЗДАЁМ ПАТЧИ ДЛЯ КАЖДОГО КОММИТА
          mkdir -p ../patches
          git format-patch -o ../patches $BASE..HEAD
          
          # Создаём также общий diff
          git diff $BASE..HEAD > ../total-diff.patch
          
          # Статистика
          echo "Total commits: $(git rev-list --count $BASE..HEAD)" > ../stats.txt
          echo "Total files changed: $(git diff --name-only $BASE..HEAD | wc -l)" >> ../stats.txt
          git diff --shortstat $BASE..HEAD >> ../stats.txt

      - name: Create info file
        run: |
          cd your-repo
          
          {
            echo "# A810 Patches Information"
            echo ""
            echo "## Commits since whitebelyash/gen8"
            echo '```'
            git log --oneline whitebelyash/gen8..HEAD
            echo '```'
            echo ""
            echo "## Changed files"
            echo '```'
            git diff --name-only whitebelyash/gen8..HEAD
            echo '```'
          } > ../README.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: a810-full-patches
          path: |
            patches/
            total-diff.patch
            stats.txt
            README.md
          retention-days: 90

      - name: Create GitHub Release
        if: github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: a810-patches-${{ github.run_number }}
          name: "A810 Full Patches #${{ github.run_number }}"
          body: |
            Full patch set with all commits

            Statistics:
            $(cat stats.txt)

            Structure:
            - `patches/` - individual patches for each commit
            - `total-diff.patch` - one big diff with all changes
          files: |
            patches/*.patch
            total-diff.patch
            stats.txt
            README.md
