name:  Create Patches from my Changes

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release with patches'
        required: true
        default: true
        type: boolean

jobs:
  create-patches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout your repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        path: your-repo

    - name: Clone whitebelyash/mesa-tu8
      run: |
        git clone https://github.com/whitebelyash/mesa-tu8.git whitebelyash-repo || \
        git clone git://github.com/whitebelyash/mesa-tu8.git whitebelyash-repo || \
        {
          echo "Failed to clone whitebelyash/mesa-tu8"
          echo "Try: https://github.com/whitebelyash/mesa-tu8"
          exit 1
        }
        
        cd whitebelyash-repo
        echo "Whitebelyash latest commit: $(git rev-parse HEAD)" > ../whitebelyash-info.txt
        git rev-parse HEAD > ../whitebelyash-commit.txt

    - name: Find common ancestor
      run: |
        cd your-repo
        
        git remote add whitebelyash https://github.com/whitebelyash/mesa-tu8.git
        git fetch whitebelyash --depth=100 || git fetch whitebelyash
        
        BASE=$(git merge-base HEAD whitebelyash/main || echo "")
        
        if [ -n "$BASE" ]; then
          echo "BASE_COMMIT=$BASE" >> $GITHUB_ENV
          echo "Found common ancestor: $BASE"
        else
          echo "Could not find common ancestor, checking first commits..."
          
          cd ../whitebelyash-repo
          WB_FIRST=$(git rev-list --max-parents=0 HEAD)
          cd ../your-repo
          
          echo "BASE_COMMIT=$WB_FIRST" >> $GITHUB_ENV
          echo "Using whitebelyash first commit: $WB_FIRST"
        fi
        
        echo "Your latest commit: $(git rev-parse HEAD)" >> ../whitebelyash-info.txt

    - name: Create mega patch (ALL changes in one file)
      run: |
        cd your-repo
        mkdir -p ../patches
        
        echo "Creating mega patch with ALL changes..."
        git diff $BASE_COMMIT..HEAD > ../patches/a810-complete.patch
        
        git diff --name-only $BASE_COMMIT..HEAD > ../patches/changed-files.txt
        
        {
          echo "# A810 Patches vs whitebelyash/mesa-tu8"
          echo ""
          echo "## Information"
          echo "- Your latest commit: $(git rev-parse HEAD)"
          echo "- Whitebelyash commit: $(cat ../whitebelyash-commit.txt)"
          echo ""
          echo "## Changed files"
          echo '```'
          cat ../patches/changed-files.txt
          echo '```'
          echo ""
          echo "## Changes statistics"
          echo '```'
          git diff --stat $BASE_COMMIT..HEAD
          echo '```'
        } > ../patches/README.md

    - name: Upload patch as artifact
      uses: actions/upload-artifact@v4
      with:
        name: a810-mega-patch
        path: patches/
        retention-days: 90

    - name: Create GitHub Release with patch
      if: github.event.inputs.create_release == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: a810-patch-${{ github.run_number }}
        name: "A810 Mega Patch #${{ github.run_number }}"
        body: |
          ONE BIG PATCH WITH ALL CHANGES

          How to use:
          ```
          git clone https://gitlab.freedesktop.org/mesa/mesa.git
          cd mesa
          git apply /path/to/a810-complete.patch
          meson setup build
          ninja -C build
          ```

          Statistics:
          - Your commit: $(cd your-repo && git rev-parse HEAD)
          - Whitebelyash commit: $(cat whitebelyash-commit.txt || echo "unknown")
          - Total files: $(cat patches/changed-files.txt | wc -l)

          Changed files:
          $(cat patches/changed-files.txt | sed 's/^/- /')
        files: |
          patches/a810-complete.patch
          patches/changed-files.txt
          patches/README.md
